<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    text-decoration: none;
    color: white;
}

html,body{
    width:100%;
    min-height:100vh;
    overflow:hidden;
}

body{
    background-image:url('https://cdn.phototourl.com/free/2026-06-16-9eba8928-fc41-472d-924e-40e72528b874.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.20);
    z-index:-1;
}

.sidebar{
    width:100vw;
    min-height:100vh;
    padding:20px;
    color:white;
    display:flex;
    flex-direction:column;
}

/* Logo Instagram diubah dengan background putih samar */
.logo{
    text-align:center;
    margin-bottom:40px;
}

.instagram-logo{
    width:100px;
    height:100px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:25px;
    
    /* Background putih samar dipertebal (opacity 0.6) */
    background: rgba(255, 255, 255, 0.6); 
    
    /* Menambahkan border agar lebih tegas */
    border: 2px solid rgba(255, 255, 255, 0.8);
    
    backdrop-filter: blur(5px);
    overflow: hidden;
}

.instagram-logo img{
    width: 75%; /* Sedikit diperkecil agar tidak menempel ke pinggir */
    height: 75%;
    object-fit: contain;
}

/* Menu */
.menu-item{
    display:flex;
    align-items:center;
    gap:18px;
    margin:28px 0;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

.menu-item:hover{
    transform:translateX(5px);
}

/* Menyamakan ukuran semua elemen logo/ikon menu */
.menu-item i, .menu-item img.custom-logo {
    width: 35px;
    height: 35px;
    font-size: 26px; /* Menyesuaikan ukuran ikon Font Awesome agar seimbang */
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    object-fit: contain;
}

/* Kotak tombol bawah */
.button-box{
    margin-top:auto;
    margin-bottom:120px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:18px;
}

/* Tombol JAWAB CS */
.btn-purple{
    width:100%;
    height:65px;
    border:none;
    border-radius:16px;
    margin-bottom:14px;
    color:white;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(90deg, #9a6cff, #8548ff, #7329f0);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.95), 0 4px 10px rgba(0,0,0,.25);
    cursor: pointer;
}

/* Tombol UBAH M3U8 LIVE */
.btn-blue{
    width:100%;
    height:65px;
    border:none;
    border-radius:16px;
    color:white;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(90deg, #3558ff, #2547ea, #1a39c9);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.95), 0 4px 10px rgba(0,0,0,.25);
    cursor: pointer;
}
</style>
</head>
<body>

<div class="sidebar">

    <div class="logo">
        <div class="instagram-logo">
            <img src="https://cdn.phototourl.com/free/2026-06-16-388d7b1b-820d-4d21-8231-34ea4628af98.png" alt="Logo">
        </div>
    </div>

    <a href="https://github.com" class="menu-item">
        <i class="fa-solid fa-bug"></i>
        <span>Perbaikan bug</span>
    </a>

    <a href="https://saweria.co" class="menu-item">
        <img src="https://cdn.phototourl.com/free/2026-06-15-8f238e79-558c-4a47-b873-ddef5602ec15.png" alt="Saweria" class="custom-logo">
        <span>Cek saweria</span>
    </a>

    <a href="https://kakungentertainment.github.io/Carim3u8" class="menu-item">
        <i class="fa-solid fa-tv"></i>
        <span>Cari m3u8</span>
    </a>

    <a href="https://gemini.google.com" class="menu-item">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Gemini</span>
    </a>

    <div class="menu-item" onclick="window.close()">
        <i class="fa-solid fa-power-off"></i>
        <span>Keluar</span>
    </div>

    <div class="button-box">
        <button class="btn-purple" onclick="window.location.href='https://kakungentertainment.github.io/Jawablayanandariuser.github.io/'">JAWAB CS</button>
        <button class="btn-blue" onclick="window.location.href='https://kakungentertainment.github.io/Adminpildun/'">UBAH M3U8 LIVE</button>
    </div>

</div>

</body>
</html>
